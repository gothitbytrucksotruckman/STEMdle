<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEMdle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <button id="menu-btn" class="link-btn" aria-label="Open menu">☰</button>
    <h1>STEMdle</h1>
    <p class="tagline">Daily engineering &amp; CS term guessing game</p>
  </header>

  <!-- Sidebar Menu -->
  <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>
  <aside id="sidebar" class="sidebar hidden">
    <h3>Menu</h3>
    <button id="sidebar-stats-btn" class="sidebar-link">📊 Stats</button>
  </aside>

  <!-- Landing / Mode Select -->
  <main id="view-landing" class="view">
    <h2>Choose your discipline</h2>
    <div id="section-buttons"></div>
  </main>

  <!-- Level Select -->
  <main id="view-levels" class="view hidden">
    <div class="game-header">
      <button id="levels-back-btn" class="link-btn">&larr; Back</button>
      <span id="levels-section-label"></span>
    </div>
    <div id="levels-list"></div>
  </main>

  <!-- Game Screen -->
  <main id="view-game" class="view hidden">
    <div class="game-header">
      <button id="back-btn" class="link-btn">&larr; Back</button>
      <span id="puzzle-label"></span>
    </div>

    <section id="hint-panel">
      <h3>Hints</h3>
      <ol id="hints-list"></ol>
    </section>

    <section id="search-area">
      <div class="search-input-group">
        <input type="text" id="search-input" placeholder="Type to search terms..." autocomplete="off">
        <button id="submit-guess-btn" class="accent-btn">Submit</button>
      </div>
      <div id="search-results"></div>
      <button id="give-up-btn" class="danger-btn">Give Up</button>
    </section>

    <section id="guess-history">
      <h3>Guesses (<span id="guess-count">0</span>)</h3>
      <ul id="guess-list"></ul>
    </section>
  </main>

  <!-- Result Screen -->
  <main id="view-result" class="view hidden">
    <h2 id="result-title"></h2>
    <div id="result-answer"></div>
    <div id="result-tier"></div>
    <div id="result-detail"></div>
    <div class="result-actions">
      <button id="share-btn" class="accent-btn">Share</button>
      <button id="play-again-btn" class="outline-btn">Pick another level</button>
    </div>
  </main>

  <!-- Stats Screen -->
  <main id="view-stats" class="view hidden">
    <div class="game-header">
      <button id="stats-back-btn" class="link-btn">&larr; Back</button>
      <span>My Stats</span>
    </div>
    <div id="stats-content"></div>
  </main>

  <footer>
    <p>STEMdle &copy; 2026. A daily engineering & CS term guessing game.</p>
  </footer>

  <div id="toast" class="toast hidden">Copied to clipboard</div>

  <script src="app.js"></script>
</body>
</html>
